<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全能管家</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 人格切换栏(最上): 一排头像图标=开启的人格(点击切换), ＋=新建/管理 -->
  <nav id="tabbar" title="点头像切换人格 · ＋新建/管理">
    <div id="tabs"></div>
    <button id="newTabBtn" title="新建/打开人格(空目录=新建, 已有=续上)">＋</button>
  </nav>

  <header id="topbar">
    <div class="brand"><span id="personaAvatar" class="cur-avatar"></span><span id="personaName">全能管家</span>
      <span class="sub" id="personaDir" title="当前人格的目录(记忆体所在)">—</span>
    </div>
    <div class="ctxwrap" title="上下文占用(真 usage)">
      <div class="ctxbar"><div id="ctxfill"></div></div>
      <div id="ctxlabel">— %</div>
    </div>
    <button id="compactBtn" title="压缩上下文: 浓缩成交接摘要并重启会话">压缩</button>
    <button id="clearBtn" title="清空上下文(/clear): 丢弃全部历史, 全新空白会话, 不留交接摘要">清空</button>
    <button id="closeCurrentBtn" title="关闭当前人格(会话记忆已落盘, 可重开续上)">×</button>
  </header>

  <!-- 舞台: 每个标签一个面板, 仅活动标签可见 -->
  <main id="stage">
    <div id="searchbar" class="hidden">
      <input id="searchInput" placeholder="搜索当前对话…" />
      <span id="searchCount">0/0</span>
      <button id="searchPrev" title="上一个 (Shift+Enter)">↑</button>
      <button id="searchNext" title="下一个 (Enter)">↓</button>
      <button id="searchClose" title="关闭 (Esc)">×</button>
    </div>
  </main>

  <div id="attachstrip"></div>

  <footer id="inputbar">
    <button id="attachBtn" title="加附件·任意文件(也可粘贴截图/拖拽文件)">📎</button>
    <textarea id="input" rows="1" placeholder="跟管家说点什么…  (Enter 发送 / Shift+Enter 换行 / 可粘贴截图、拖拽文件)"></textarea>
    <button id="cancelBtn" title="打断当前一轮 · 消息文本回填到输入框" style="display:none">⏹ 取消</button>
    <button id="sendBtn">发送</button>
    <input id="fileInput" type="file" multiple hidden />
  </footer>

  <script src="md.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
